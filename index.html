<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  background: linear-gradient(#111, #ffcc00);
  color: #fff;
}

/* ヘッダー /
header {
  background: #000;
  color: #ffcc00;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

/ インスタ /
.insta-header {
  width: 28px;
}

/ ナビ /
nav {
  background: #000;
  padding: 8px 15px;
}

nav a {
  color: #fff;
  margin-right: 12px;
  text-decoration: none;
  font-size: 14px;
}

/ ヒーロー /
.hero {
  background: url('anime-gym.jpg') center/cover;
  text-align: center;
  padding: 80px 15px;
  position: relative;
}

.hero h1 {
  font-size: 26px;
  font-weight: bold;
  text-shadow: 2px 2px 0 #000;
}

.hero p {
  font-size: 16px;
  margin-top: 10px;
}

/ ドン!!風 /
.impact {
  font-size: 40px;
  color: #ff0000;
  font-weight: bold;
  transform: rotate(-5deg);
}

/ セクション /
.section {
  padding: 40px 15px;
  text-align: center;
}

.section h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/ グレー背景 /
#about {
  background: #fff;
  color: #000;
}

/ カード /
.flex {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.menu-btn {
  width: 90%;
  max-width: 320px;
  padding: 25px;
  border-radius: 15px;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  display: block;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.menu-btn:hover {
  transform: scale(1.07);
}

/ カラー /
.trial { background: #ff6600; }
.diet { background: #e60023; }
.bodymake { background: #007bff; }

.menu-btn p {
  font-size: 14px;
  margin-top: 5px;
}

/ CTA /
.cta {
  background: #06C755;
  color: #fff;
  padding: 15px 25px;
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
  border-radius: 50px;
  font-size: 18px;
}

/ フッター /
footer {
  background: #000;
  text-align: center;
  padding: 20px;
}

/ 固定LINE /
.line-fixed {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #06C755;
  color: #fff;
  padding: 18px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
}

/ PC */
@media(min-width:768px){
  .flex {
    flex-direction: row;
    justify-content: center;
  }
}
</style>
</head>

<body>

<header>
  <h1>🔥 apricot gym 🔥</h1>
  <a href="https://www.instagram.com/gym_seikotuin?igsh=MWFjY2JqYnJ4ZDRjMw%3D%3D&utm_source=qr">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="insta-header">
  </a>
</header>

<nav>
  <a href="#about">👤トレーナー</a>
  <a href="#menu">💪メニュー</a>
  <a href="#access">📍アクセス</a>
</nav>

<!-- トップ -->
<section class="hero">
  <div class="impact">ドン！！</div>
  <h1>人生変えるなら、今だ。</h1>
  <p>初心者OK・無理な食事制限なし</p>
  <a href="https://lin.ee/xUmAtVC" class="cta">LINEで無料相談</a>
</section>

<!-- トレーナー -->
<section id="about" class="section">
  <h2>🔥トレーナー紹介🔥</h2>
  <img src="trainer.jpg">
  <p>
  あなた専用のトレーニングで<br>
  最短で理想の身体へ。
  </p>
</section>

<!-- メニュー -->
<section id="menu" class="section">
  <h2>💪トレーニングメニュー</h2>

  <div class="flex">

    <a href="#" class="menu-btn trial">
      <h3>体験トレーニング</h3>
      <p>まずは気軽にスタート</p>
    </a>

    <a href="#" class="menu-btn diet">
      <h3>ダイエットコース</h3>
      <p>女性に人気No.1</p>
    </a>

    <a href="#" class="menu-btn bodymake">
      <h3>ボディメイク</h3>
      <p>筋肉・フィジーク特化</p>
    </a>

  </div>

</section>

<footer>
  <p>© apricot gym</p>
</footer>

<a href="https://lin.ee/xUmAtVC" class="line-fixed">LINE予約</a>

</body>
</html>
